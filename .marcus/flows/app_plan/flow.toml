[flow]
name = "app_plan"
description = "Plan an application before scaffolding"
version = "1.0.0"
author = "marcus"

[model]
provider = "ollama"
model = "qwen3.5:397b-cloud"
temperature = 0.2
max_tokens = 4096

[input]
requires = ["description"]
optional = ["stack", "constraints"]

[output]
format = "text"
save_to = ""

[behavior]
stream = false
confirm_before_apply = true
auto_fix = false

tools = []
